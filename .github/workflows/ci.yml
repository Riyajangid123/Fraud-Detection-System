name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest test/test_api.py -v

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest

      - name: Build and Push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-frontend:latest
  
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            
            set -e

            echo "Moving to project directory..."
            cd Fraud-Detection-System

            echo "Pulling latest Docker images..."
            docker-compose -f Docker-Compose.yml pull

            echo "Stopping old containers..."
            docker-compose -f Docker-Compose.yml down || true

            echo "Starting services..."
            docker-compose -f Docker-Compose.yml up -d

            echo "Waiting for containers..."
            sleep 20

            echo "Container status:"
            docker ps

            echo "Checking API..."
            curl -sf --max-time 5 http://localhost:8000/ >/dev/null && echo "API OK" || echo "API FAILED"

            echo "Checking Frontend..."
            curl -sf --max-time 5 http://localhost:8501/ >/dev/null && echo "FRONTEND OK" || echo "FRONTEND FAILED"

            echo "Recent logs:"
            docker-compose -f Docker-Compose.yml logs --tail=50

            echo "Deployment finished"