name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest test/test_api.py -v

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest

      - name: Build and Push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-frontend:latest
  
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            
            if [ ! -d "Fraud-Detection-System" ]; then
              echo "Cloning repository..."
              git clone https://github.com/Riyajangid123/Fraud-Detection-System.git
            fi
            
            cd Fraud-Detection-System
            echo "Pulling latest code..."
            git pull origin main
            
            echo "Creating environment file..."
            cat > .env << 'EOF'
            DB_HOST=mysql_db
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            EOF
            
            echo "Stopping old containers..."
            docker-compose -f Docker-Compose.yml down  || true
            
            echo "Cleaning up..."
            docker system prune -f
            
            echo "Pulling latest images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/fraud-detection-frontend:latest
            
            echo "Waiting for services to initialize..."
            sleep 15

            echo "Checking API health..."
            for i in 1 2 3; do
              if curl -sf http://localhost:8000/ >/dev/null; then
                echo "API is healthy!"
                break
              fi
              echo "API not ready (attempt $i/3)"
              sleep 5
            done

            echo "Checking Frontend health..."
            for i in 1 2 3; do
              if curl -sf http://localhost:8501/ >/dev/null; then
                echo "Frontend is healthy!"
                break
              fi
              echo "Frontend not ready (attempt $i/3)"
              sleep 5
            done

            echo "Recent logs:"
            docker-compose -f Docker-Compose.yml logs --tail=30

            echo "Deployment completed!"