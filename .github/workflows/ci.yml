name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy model for testing
        run: |
          python -c "
          import joblib, os
          from unittest.mock import MagicMock
          os.makedirs('models', exist_ok=True)
          mock_model = MagicMock()
          mock_model.predict_proba = lambda x: [[0.2, 0.8]]
          joblib.dump(mock_model, 'models/model.pkl')
          "

      - name: Run tests
        run: |
          python -m pytest test/test_api.py -v

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.riya7737 }}
          password: ${{ secrets.November2005 }}

      - name: Build and Push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.riya7737 }}/fraud-detection-api:latest

      - name: Build and Push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.riya7737 }}/fraud-detection-frontend:latest