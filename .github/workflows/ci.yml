name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest test/test_api.py -v

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest

      - name: Build and Push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-frontend:latest
  
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Pulling latest Docker images..."
            docker-compose -f Docker-Compose.yml pull

            echo "Creating environment file..."
            cat > .env << 'EOF'
            DB_HOST=mysql_db
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            EOF

            echo "Stopping old containers..."
            docker-compose -f Docker-Compose.yml down || true

            echo "Starting services..."
            docker-compose -f Docker-Compose.yml up -d

            echo "Waiting for services..."
            sleep 20

            echo "Checking container status..."
            docker ps

            echo "Checking API health..."
            if curl -sf http://localhost:8000/ >/dev/null; then
              echo "API is healthy"
            else
              echo "API FAILED"
              exit 1
            fi

            echo "Checking Frontend health..."
            if curl -sf http://localhost:8501/ >/dev/null; then
              echo "Frontend is healthy"
            else
              echo "Frontend FAILED"
              exit 1
            fi

            echo "Recent logs:"
            docker-compose -f Docker-Compose.yml logs --tail=30

            echo "Deployment SUCCESS"